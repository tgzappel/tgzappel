<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Leaderboard</title>
    <link rel="icon" type="image/jpg" href="assets/favicon.jpg">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <a href="index.html" class="logo-link"><img src="assets/Newlogo.png" class="nav-logo"></a>
        <div class="nav-links">
            <a href="index.html">Levels</a>
            <a href="leaderboard.html" class="active">Leaderboard</a>
        </div>
    </nav>

    <div id="container" style="max-width: 800px; margin: 40px auto; padding: 20px;">
        <h1 style="text-align:center; font-weight: 800; margin-bottom: 30px;">Leaderboard</h1>
        <div id="leaderboard-list"></div>
    </div>

    <div id="playerModal" class="modal">
        <div class="modal-content">
            <span onclick="closePlayerModal()" class="close-btn">&times;</span>
            <div id="player-modal-body"></div>
        </div>
    </div>

    <script src="data.js"></script>
    <script>
        function renderLevels() {
            if (!window.DATA.players) return;
            const list = DATA.players.map(p => {
                let pts = 0;
                p.completions.forEach(id => {
                    const l = DATA.levels.find(lvl => String(lvl.id).trim() === String(id).trim());
                    if (l) pts += parseFloat(l.points) || 0;
                });
                return { name: p.name, pts: pts, count: p.completions.length };
            }).sort((a,b) => b.pts - a.pts);

            document.getElementById('leaderboard-list').innerHTML = list.map((p, i) => {
                let rank = `#${i + 1}`;
                if (i === 0) rank = "🥇"; if (i === 1) rank = "🥈"; if (i === 2) rank = "🥉";
                return `
                <div class="level-entry" onclick="showPlayerDetails('${p.name.replace(/'/g, "\\'")}')">
                    <div class="level-rank">${rank}</div>
                    <div class="level-info"><b>${p.name}</b><br><small>${p.count - 1} completions</small></div>
                    <div class="level-points">${p.pts.toLocaleString()} pts</div>
                </div>`;
            }).join('');
        }

        function showPlayerDetails(playerName) {
            const player = DATA.players.find(p => p.name === playerName);
            const comps = player.completions.map(id => {
                const idx = DATA.levels.findIndex(l => String(l.id).trim() === String(id).trim());
                return idx !== -1 ? { rank: idx + 1, name: DATA.levels[idx].name } : null;
            }).filter(x => x).sort((a,b) => a.rank - b.rank);

            document.getElementById('player-modal-body').innerHTML = `
                <h2>${player.name}</h2>
                <p style="color:var(--text-muted); margin-bottom: 15px;">Total Completions: ${comps.length}</p>
                <div style="max-height: 400px; overflow-y: auto; border-top: 1px solid #eee;">
                    ${comps.map(c => `<div style="padding:12px; border-bottom:1px solid #f9f9f9;"><b>#${c.rank}</b> — ${c.name}</div>`).join('')}
                </div>`;
            document.getElementById('playerModal').style.display = "block";
            document.body.style.overflow = "hidden";
        }
        function closePlayerModal() { document.getElementById('playerModal').style.display="none"; document.body.style.overflow="auto"; }
    </script>
</body>
</html>
