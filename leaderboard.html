<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Leaderboard | The Grandmaster Zone</title>
    <link rel="icon" type="image/png" href="assets/favicon.png">
    <link rel="stylesheet" href="style.css">
    <style>
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 40px; 
            height: 70px;
        }
        .nav-links {
            display: flex;
            gap: 20px;
            margin-left: auto; 
        }
        .rank-purple { background-color: #f3e5f5 !important; border-color: #e1bee7 !important; }
        .rank-blue   { background-color: #e3f2fd !important; border-color: #bbdefb !important; }
        .rank-green  { background-color: #e8f5e9 !important; border-color: #c8e6c9 !important; }
        .rank-yellow { background-color: #fffde7 !important; border-color: #fff9c4 !important; }
        .rank-red    { background-color: #ffebee !important; border-color: #ffcdd2 !important; }
        .rank-gray   { background-color: #fafafa !important; border-color: #eeeeee !important; }
        .level-rank { color: #333 !important; font-weight: 800; }
        .flag-container { width: 24px; height: 16px; display: inline-block; vertical-align: middle; margin-right: 10px; border-radius: 2px; overflow: hidden; object-fit: cover; }
        .no-flag { border: 1px dashed #ccc; background-color: #fff; box-sizing: border-box; }
        #loading-msg { text-align: center; font-weight: 600; color: #666; margin-top: 50px; }
    </style>
</head>
<body>
    <nav>
        <a href="index.html" class="logo-link"><img src="assets/Newlogo.png" class="nav-logo"></a>
        <div class="nav-links">
            <a href="index.html">Levels</a>
            <a href="leaderboard.html" class="active">Leaderboard</a>
        </div>
    </nav>
    <div id="container" style="max-width: 800px; margin: 40px auto; padding: 20px;">
        <h1 style="text-align:center; font-weight: 800; margin-bottom: 30px;">Leaderboard</h1>
        <div id="loading-msg">Fetching live records...</div>
        <div id="leaderboard-list"></div>
    </div>
    <div id="playerModal" class="modal"><div class="modal-content"><span onclick="closePlayerModal()" class="close-btn">&times;</span><div id="player-modal-body"></div></div></div>

    <script>
        const SHEET_URL = "https://script.google.com/macros/s/AKfycbw2J9pN6HUDkgrrRRgS6OiN_ejs7VJmWOgBGl8j7ZbBuVhUXtj8Y5J15YnAjRkGkzg/exec"; 

        async function fetchData() {
            try {
                const res = await fetch(SHEET_URL);
                const json = await res.json();
                window.DATA = json;
                render();
            } catch (e) {
                document.getElementById('loading-msg').innerHTML = "Error loading data.";
            }
        }

        function render() {
            if (!DATA || !DATA.players) return;
            document.getElementById('loading-msg').style.display = 'none';
            
            const players = DATA.players.map(p => {
                const valid = (p.completions || []).filter(id => id && String(id).trim() !== "");
                let pts = 0;
                valid.forEach(id => {
                    const l = DATA.levels.find(lvl => String(lvl.id).trim() === String(id).trim());
                    if (l) pts += parseFloat(l.points) || 0;
                });
                return { ...p, pts, count: valid.length, completions: valid };
            }).sort((a, b) => b.pts - a.pts);

            window.CALC_PLAYERS = players;
            document.getElementById('leaderboard-list').innerHTML = players.map((p, i) => {
                const r = i + 1;
                let c = "rank-gray";
                if(r<=3) c="rank-purple"; else if(r<=10) c="rank-blue"; else if(r<=25) c="rank-green"; else if(r<=50) c="rank-yellow"; else if(r<=100) c="rank-red";
                return `<div class="level-entry ${c}" onclick="show('${p.name.replace(/'/g, "\\'")}')">
                    <div class="level-rank">#${r}</div>
                    <div class="level-info"><b>${p.name}</b><br><small>${p.count} completions</small></div>
                    <div class="level-points">${p.pts.toLocaleString()} pts</div>
                </div>`;
            }).join('');
        }

        function show(n) {
            const p = CALC_PLAYERS.find(x => x.name === n);
            const comps = p.completions.map(id => {
                const l = DATA.levels.find(lvl => String(lvl.id).trim() === String(id).trim());
                return l ? { name: l.name } : null;
            }).filter(x => x);
            document.getElementById('player-modal-body').innerHTML = `<h2>${p.name}</h2><p>Completions: ${p.count}</p><hr>` + 
                comps.map(c => `<div style="padding:10px; border-bottom:1px solid #eee;">${c.name}</div>`).join('');
            document.getElementById('playerModal').style.display="block";
        }
        function closePlayerModal() { document.getElementById('playerModal').style.display="none"; }
        window.onload = fetchData;
    </script>
</body>
</html>
