<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Leaderboard</title>
    <link rel="icon" type="image/png" href="assets/favicon.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <a href="index.html" class="logo-link">
            <img src="assets/Newlogo.png" class="nav-logo">
        </a>
        <div class="nav-links">
            <a href="index.html">Levels</a>
            <a href="leaderboard.html" class="active">Leaderboard</a>
        </div>
    </nav>

    <div id="container" style="max-width: 800px; margin: 40px auto; padding: 20px;">
        <h1 style="text-align:center; font-weight: 800; margin-bottom: 30px;">Leaderboard</h1>
        <div id="leaderboard-list"></div>
    </div>

    <div id="playerModal" class="modal">
        <div class="modal-content">
            <span onclick="closePlayerModal()" class="close-btn">&times;</span>
            <div id="player-modal-body"></div>
        </div>
    </div>

    <script src="data.js"></script>
    <script>
        function renderLevels() {
            if (!window.DATA || !window.DATA.players) return;

            // Process data and calculate total points
            const list = DATA.players.map(p => {
                let pts = 0;
                p.completions.forEach(id => {
                    const l = DATA.levels.find(lvl => String(lvl.id).trim() === String(id).trim());
                    if (l) pts += parseFloat(l.points) || 0;
                });
                return { 
                    name: p.name, 
                    pts: pts, 
                    count: p.completions.length 
                };
            }).sort((a, b) => b.pts - a.pts);

            // Generate the list HTML
            document.getElementById('leaderboard-list').innerHTML = list.map((p, i) => {
                let rank = `#${i + 1}`;
                if (i === 0) rank = "🥇"; 
                if (i === 1) rank = "🥈"; 
                if (i === 2) rank = "🥉";
                
                // Special logic: Everyone has -1 completion except wyatpenguin
                const displayedCount = (p.name === "wyatpenguin") ? p.count : (p.count - 1);

                return `
                <div class="level-entry" onclick="showPlayerDetails('${p.name.replace(/'/g, "\\'")}')">
                    <div class="level-rank">${rank}</div>
                    <div class="level-info">
                        <b>${p.name}</b><br>
                        <small>${displayedCount} completions</small>
                    </div>
                    <div class="level-points" style="font-weight: 800; color: var(--accent);">
                        ${p.pts.toLocaleString()} pts
                    </div>
                </div>`;
            }).join('');
        }

        function showPlayerDetails(playerName) {
            const player = DATA.players.find(p => p.name === playerName);
            if (!player) return;

            const comps = player.completions.map(id => {
                const idx = DATA.levels.findIndex(l => String(l.id).trim() === String(id).trim());
                return idx !== -1 ? { rank: idx + 1, name: DATA.levels[idx].name } : null;
            }).filter(x => x).sort((a, b) => a.rank - b.rank);

            // Keep modal count consistent with the list count logic
            const modalCount = (player.name === "wyatpenguin") ? comps.length : (comps.length - 1);

            document.getElementById('player-modal-body').innerHTML = `
                <h2 style="margin-top: 0;">${player.name}</h2>
                <p style="color:var(--text-muted); margin-bottom: 20px; font-weight: 600;">
                    Total Completions: ${modalCount}
                </p>
                <div style="max-height: 400px; overflow-y: auto; border-top: 1px solid var(--border); border-radius: 10px;">
                    ${comps.map(c => `
                        <div style="padding:15px; border-bottom:1px solid #f5f5f7; display: flex; justify-content: space-between;">
                            <span><b>#${c.rank}</b> — ${c.name}</span>
                        </div>
                    `).join('')}
                </div>`;
                
            document.getElementById('playerModal').style.display = "block";
            document.body.style.overflow = "hidden";
        }

        function closePlayerModal() { 
            document.getElementById('playerModal').style.display = "none"; 
            document.body.style.overflow = "auto"; 
        }

        // Initialize the page
        window.onload = renderLevels;
    </script>
</body>
</html>
