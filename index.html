<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>The Grandmaster Zone</title>
    <link rel="icon" type="image/png" href="assets/favicon.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav>
        <a href="index.html" class="logo-link">
            <img src="assets/Newlogo.png" alt="Logo" class="nav-logo">
        </a>
        <div class="nav-links">
            <a href="index.html" class="active">Levels</a>
            <a href="leaderboard.html">Leaderboard</a>
        </div>
    </nav>

    <div id="main-layout">
        <main>
            <div id="list-view"></div>
        </main>

        <aside id="sidebar">
            <a href="YOUR_FORM_LINK" target="_blank" class="submit-btn">Submit Record</a>
            <h3 style="font-size:0.75rem; color:var(--text-muted); margin-bottom:15px;">FILTER SKILLS</h3>
            <div id="tag-filters"><button class="tag-btn" onclick="toggleTag('Blues')">Blues</button>
                <button class="tag-btn" onclick="toggleTag('Chokepoint')">Chokepoint</button>
                <button class="tag-btn" onclick="toggleTag('Crouch Spam')">Crouch Spam</button>
                <button class="tag-btn" onclick="toggleTag('Crumble')">Crumble</button>
                <button class="tag-btn" onclick="toggleTag('Crusher')">Crusher</button>
                <button class="tag-btn" onclick="toggleTag('Endurance')">Endurance</button>
                <button class="tag-btn" onclick="toggleTag('Gerald Gameplay')">Gerald Gameplay</button>
                <button class="tag-btn" onclick="toggleTag('Kaizo')">Kaizo</button>
                <button class="tag-btn" onclick="toggleTag('Keydoor')">Keydoor</button>
                <button class="tag-btn" onclick="toggleTag('Litejumps')">Litejumps</button>
                <button class="tag-btn" onclick="toggleTag('Memory')">Memory</button>
                <button class="tag-btn" onclick="toggleTag('Mob')">Mob</button>
                <button class="tag-btn" onclick="toggleTag('Momentum Control')">Momentum Control</button>
                <button class="tag-btn" onclick="toggleTag('Needle Gameplay')">Needle Gameplay</button>
                <button class="tag-btn" onclick="toggleTag('Precision')">Precision</button>
                <button class="tag-btn" onclick="toggleTag('Routing')">Routing</button>
                <button class="tag-btn" onclick="toggleTag('Sidejumps')">Sidejumps</button>
                <button class="tag-btn" onclick="toggleTag('Speedrun')">Speedrun</button>
                <button class="tag-btn" onclick="toggleTag('Spikedges')">Spikedges</button>
                <button class="tag-btn" onclick="toggleTag('Strategy')">Strategy</button>
                <button class="tag-btn" onclick="toggleTag('Technical')">Technical</button>
                <button class="tag-btn" onclick="toggleTag('Trampoline')">Trampoline</button>
                <button class="tag-btn" onclick="toggleTag('Walljumps')">Walljumps</button>
                </div>
        </aside>
    </div>

    <div id="infoModal" class="modal">
        <div class="modal-content">
            <span onclick="closeModal()" class="close-btn">&times;</span>
            <div id="modal-body"></div>
        </div>
    </div>

    <script src="data.js"></script>
    <script>
        let activeTags = [];

        function renderLevels() { filterLevels(); }

        function toggleTag(tag) {
            event.currentTarget.classList.toggle('active-tag');
            activeTags.includes(tag) ? activeTags = activeTags.filter(t => t !== tag) : activeTags.push(tag);
            filterLevels();
        }

        function getStatColor(val) {
            const num = parseFloat(String(val).split('/')[0]);
            if (isNaN(num)) return "#86868b";
            if (num <= 45) return "#cc0000"; 
            if (num <= 75) return "#e6ac00"; 
            return "#00cc44";
        }

        function filterLevels() {
            if (!window.DATA.levels) return;

            // Filtering now only checks active tags from the sidebar
            const filtered = DATA.levels.filter(lvl => {
                return activeTags.length === 0 || activeTags.every(t => lvl.skills.includes(t));
            });

            document.getElementById('list-view').innerHTML = filtered.map((lvl, i) => {
                let rankText = `#${i + 1}`;
                if (i === 0) rankText = "🥇"; 
                if (i === 1) rankText = "🥈"; 
                if (i === 2) rankText = "🥉";

                const diffIcon = lvl.difficulty ? `<img src="assets/${lvl.difficulty.trim()}.png" class="diff-icon-small">` : '';

                return `
                <div class="level-entry" onclick="showLevelDetails('${lvl.id}')">
                    <img class="level-thumb" src="${lvl.img}">
                    <div class="level-rank">${rankText}</div>
                    <div class="level-info">
                        <div class="level-name">${lvl.name}</div>
                        <div class="level-meta">by ${lvl.author}</div>
                        <div class="level-meta" style="color:var(--accent); font-weight:700;">${lvl.points}pts</div>
                    </div>
                    <div class="level-difficulty-slot">
                        ${diffIcon}
                    </div>
                </div>`;
            }).join('');
        }

        function showLevelDetails(id) {
            const lvl = DATA.levels.find(l => String(l.id).trim() === String(id).trim());
            const victors = DATA.players.filter(p => p.completions.includes(id));
            const check = (val) => (val && String(val).trim() !== "") ? val : "N/A";

            // Logic for the Location link
            const locationLink = (lvl.location && lvl.location.includes('http')) 
                ? `<a href="${lvl.location}" target="_blank" class="submit-btn" style="text-decoration:none; margin-top:10px; display:inline-block; width:auto; padding:10px 25px;">Play Level</a>`
                : `<p style="color:var(--text-muted); font-style:italic;">Unavailable</p>`;

            document.getElementById('modal-body').innerHTML = `
                <div style="width:100%; aspect-ratio:4/3; overflow:hidden; border-radius:15px; margin-bottom:20px; border:1px solid var(--border);">
                    <img src="${lvl.img}" style="width:100%; height:100%; object-fit:cover;">
                </div>
                
                <div style="display:flex; justify-content:space-between; align-items:flex-start;">
                    <div>
                        <h2 style="margin:0;">${lvl.name}</h2>
                        <p style="color:var(--text-muted); margin-bottom:10px;">By <strong>${lvl.author}</strong></p>
                        ${locationLink}
                    </div>
                    <img src="assets/${lvl.difficulty.trim()}.png" class="diff-icon-large">
                </div>

                <div class="stat-grid" style="margin-top:25px;">
                    <div class="stat-box">
                        <div class="stat-label">Enjoyment</div>
                        <div class="stat-value" style="color:${getStatColor(lvl.enjoyment)}">${check(lvl.enjoyment)}</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-label">Quality</div>
                        <div class="stat-value" style="color:${getStatColor(lvl.quality)}">${check(lvl.quality)}</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-label">Skill/Effort Balance</div>
                        <div class="stat-value">${check(lvl.ratio)}</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-label">Verifier</div>
                        <div class="stat-value">${check(lvl.verifier)}</div>
                    </div>
                </div>

                <h3 class="modal-sub-header">Skills Required</h3>
                <div style="margin-bottom:15px;">
                    ${lvl.skills ? lvl.skills.split(',').map(s => `<span class="skill-tag">${s.trim()}</span>`).join('') : '<span style="color:#ccc;">N/A</span>'}
                </div>

                <p style="line-height:1.6; color:#444; margin-top:15px; background:#f9f9f9; padding:15px; border-radius:10px;">
                    ${lvl.desc || "No description provided."}
                </p>
                
                <hr style="border:0; border-top:1px solid #eee; margin:20px 0;">
                
                <h3 class="modal-sub-header">Victors (${victors.length})</h3>
                <div>
                    ${victors.length > 0 ? victors.map(v => `<span class="victor-pill">${v.name}</span>`).join('') : '<span style="color:#ccc; font-style:italic;">No victors yet.</span>'}
                </div>`;
                
            document.getElementById('infoModal').style.display = "block";
            document.body.style.overflow = "hidden";
        }
        function closeModal() { document.getElementById('infoModal').style.display = "none"; document.body.style.overflow = "auto"; }
    </script>
</body>
</html>
